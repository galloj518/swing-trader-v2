name: Regression Artifacts

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

jobs:
  regressions:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      # This is the deterministic trust lane. It intentionally covers packet,
      # scanner, selector, anchors, reporting, tracking, and integration tests,
      # plus the supporting analysis/data/market tests those layers depend on.
      #
      # We intentionally exclude the live-provider smoke marker here because
      # yfinance network responses are non-deterministic and would weaken the
      # artifact-regression contract this workflow is meant to protect.
      # Live provider contract coverage runs in a separate smoke workflow.
      - name: Run deterministic regression suite
        env:
          PYTHONPATH: src
        run: |
          python -m pytest tests -m "not live_provider" -q -p no:cacheprovider

      - name: Verify pipeline modules compile
        env:
          PYTHONPATH: src
        run: |
          python -m compileall src/swingtrader_v2/pipelines
