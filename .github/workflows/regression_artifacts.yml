name: Regression Artifacts

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

jobs:
  regressions:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Verify artifact and orchestration regressions
        env:
          PYTHONPATH: src
        run: |
          python -m pytest tests/packet tests/selector tests/reporting tests/tracking -q -p no:cacheprovider
          python -m compileall src/swingtrader_v2/pipelines

