name: Live Provider Smoke

on:
  workflow_dispatch:
  schedule:
    # Separate from the deterministic trust lane. This runs a small provider
    # contract smoke check without turning live responses into golden artifacts.
    # The paired test lane is intentionally narrow: external provider/env
    # unavailability may skip, but empty normalized outputs and contract
    # regressions are expected to fail.
    - cron: "0 12 * * 1"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run live provider contract smoke
        env:
          PYTHONPATH: src
          SWINGTRADER_RUN_LIVE_SMOKE: "1"
        run: |
          python -m pytest tests/data/test_live_provider_smoke.py -m live_provider -q -p no:cacheprovider
